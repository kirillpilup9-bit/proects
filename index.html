<!DOCTYPE html>
<html lang="lv">
<head>
    <meta charset="UTF-8">
    <title>Nāves ēnā</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f4f8;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 60%;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
        }
        h2 {
            color: #555;
        }
        p {
            line-height: 1.6;
        }
        .kods {
            margin-top: 20px;
            padding: 10px;
            background-color: #eaf2ff;
            border-left: 5px solid #3498db;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Nāves ēnā</h1>
    <h2>Autors: Rūdolfs Blaumanis</h2>

    <p>
        Stāsts par zvejniekiem, kuri nonāk uz ledus gabala un cīnās par izdzīvošanu.
        Darbs parāda cilvēku raksturus un emocijas bīstamā situācijā.
    </p>

    <div class="kods">
        <h3>Kods (secinājums)</h3>
        <p>
            Grūtībās atklājas cilvēka patiesā daba, un dzīvība ir vislielākā vērtība.
        </p>
    </div>
</div>

</body>
</html>
